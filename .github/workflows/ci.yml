name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint, types, tests, SAST)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy app
      - name: Tests + coverage gate
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85
      - name: SAST (bandit)
        run: bandit -r app -q --skip B101,B105,B311
      - name: Dependency audit (pip-audit, advisory)
        run: pip-audit || true

  migrations:
    name: Migrations (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saiva
          POSTGRES_PASSWORD: saiva
          POSTGRES_DB: saiva
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U saiva"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://saiva:saiva@localhost:5432/saiva
      SECRET_KEY: ci-not-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Apply migrations (must succeed on Postgres)
        run: alembic upgrade head
      - name: Check migrations match models (no drift)
        run: alembic check

  frontend:
    name: Frontend (lint, build, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type-check + build
        run: npm run build
      - name: Tests (vitest)
        run: npm run test

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
