name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Newer pushes on the same ref supersede in-progress runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint, types, tests, SAST)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy app
      - name: Tests + coverage gate
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85
      - name: SAST (bandit)
        run: bandit -r app -q --skip B101,B105,B311
      - name: Dependency audit (pip-audit, advisory)
        run: pip-audit || true

  migrations:
    name: Migrations (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saiva
          POSTGRES_PASSWORD: saiva
          POSTGRES_DB: saiva
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U saiva"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://saiva:saiva@localhost:5432/saiva
      SECRET_KEY: ci-not-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Apply migrations (must succeed on Postgres)
        run: alembic upgrade head
      - name: Check migrations match models (no drift)
        run: alembic check

  frontend:
    name: Frontend (lint, build, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type-check + build
        run: npm run build
      - name: Tests (vitest)
        run: npm run test

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Which top-level areas changed, so we only rebuild the affected image(s).
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # On a green push to main, publish the changed image(s) to GHCR as the rolling
  # `edge` tag plus an immutable `sha-<short>` for pinning/rollback. `:latest` and
  # semver tags stay reserved for `v*` releases (release.yml).
  publish:
    name: Publish ${{ matrix.image }} (edge)
    needs: [backend, migrations, frontend, security, changes]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' && (
        (matrix.filter == 'backend' && needs.changes.outputs.backend == 'true') ||
        (matrix.filter == 'frontend' && needs.changes.outputs.frontend == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { image: saiva-api, context: ./backend, filter: backend }
          - { image: saiva-web, context: ./frontend, filter: frontend }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          build-args: |
            SAIVA_VERSION=${{ steps.meta.outputs.version }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
