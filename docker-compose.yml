# Saiva — one-command self-hosted deployment.
#   cp .env.example .env  &&  edit .env  &&  docker compose up -d
#
# Caddy terminates HTTPS and routes /api/* to the API and everything else to the SPA.
name: saiva

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saiva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saiva}
      POSTGRES_DB: ${POSTGRES_DB:-saiva}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saiva} -d ${POSTGRES_DB:-saiva}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-saiva}:${POSTGRES_PASSWORD:-saiva}@db:5432/${POSTGRES_DB:-saiva}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    environment:
      SAIVA_SITE_ADDRESS: ${SAIVA_SITE_ADDRESS:-localhost}
      SAIVA_SITE_HOST: ${SAIVA_SITE_HOST:-localhost}
      SAIVA_TLS: ${SAIVA_TLS:-internal}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config:
